<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="img/logo.png" type="image/x-icon">

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
        }

        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .snap-section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
        }

        .header {
            background: #e9ecef;
            padding: 10px 20px;
        }

        .info-box {
            background: #e6a8a8;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: #ddd;
            border-radius: 10px;
            padding: 20px;
            height: 180px;
        }

        .box {
            background: #ddd;
            border-radius: 10px;
            height: 150px;
            padding: 15px;
            position: relative;
        }

        .box span {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
        }


        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #ff7b7b;
            color: white;
            font-size: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 999;
        }

        @media (max-width: 768px) {
            .info-box {
                height: 200px;
            }

            .card-custom {
                margin-bottom: 15px;
            }
        }
    </style>

</head>

<body>

    <div class="header d-flex align-items-center sticky-top" style="z-index: 1000; border-bottom: 1px solid #dee2e6;">
        <img src="img/logo.png" width="40" class="me-2">
        <h6 class="mb-0">Ka-Barangay Connect: San Bartolome</h6>
    </div>

    <div class="snap-container">
        <section class="snap-section">
            <div class="container-fluid">
                <div class="info-box my-3">
                    <p>info about brgy</p>
                </div>
                <div class="container">
                    <div class="row text-center">
                        <div class="col-12 col-md-6">
                            <div class="card-custom">
                                <h5>Vision</h5>
                                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="card-custom">
                                <h5>Mission</h5>
                                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="snap-section">
            <div class="container">
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <div class="box mb-3">Announcement <span>More</span></div>
                        <div class="box">Project <span>More</span></div>
                    </div>
                    <div class="col-12 col-md-8">
                        <div class="box h-100">Community Issue <span>More</span></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <a href="report.html" class="floating-btn" style="text-decoration: none;">+</a>

</body>

</html>
