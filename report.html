<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="img/logo.png" type="image/x-icon"> 
    
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .header-spacer {
            background-color: #dee2e6;
            height: 80px;
            width: 100%;
            border-radius: 8px 8px 0 0;
        }

        .report-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding-bottom: 30px;
        }

        .inner-form-box {
            background-color: #e9ecef;
            padding: 40px;
            border-radius: 8px;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .form-control {
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 1rem;
        }

        .btn-choose-image {
            background-color: #f1f1f1;
            border: 2px solid #333;
            color: #333;
            font-weight: bold;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-choose-image:hover {
            background-color: #333;
            color: white;
        }

        .btn-submit-large {
            background-color: #ff9999;
            color: white;
            border: none;
            padding: 15px 80px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-submit-large:hover {
            transform: scale(1.05);
            background-color: #ff8080;
        }

        #fileInput, #cameraInput { display: none; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-11 col-lg-10">
            
            <div class="report-card">
                <div class="header-spacer"></div>
                
                <div class="container-fluid px-md-5 mt-4">
                    <div class="inner-form-box">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label>Name:</label>
                                <input type="text" class="form-control mb-3" placeholder="Enter your name">
                                
                                <label>Title:</label>
                                <input type="text" class="form-control mb-3" placeholder="Report Title">
                                
                                <label>Category:</label>
                                <input type="text" class="form-control mb-3" placeholder="e.g. Maintenance, Emergency">
                            </div>

                            <div class="col-md-6 mb-4">
                                <label>Description:</label>
                                <textarea class="form-control" style="height: 215px;" placeholder="Provide details..."></textarea>
                            </div>
                        </div>

                        <div class="row mt-2">
                            <div class="col-12">
                                <input type="file" id="fileInput" accept="image/*">
                                <input type="file" id="cameraInput" accept="image/*" capture="environment">
                                
                                <button type="button" class="btn btn-choose-image" onclick="showImageOptions()">
                                    Choose Image
                                </button>
                                <span id="fileNameDisplay" class="ms-3 text-muted">No file selected</span>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <button type="button" class="btn btn-submit-large">Submit</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function showImageOptions() {
        const choice = confirm("Open Camera? (Click 'Cancel' to choose from Gallery)");
        if (choice) {
            document.getElementById('cameraInput').click();
        } else {
            document.getElementById('fileInput').click();
        }
    }

    const handleFile = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('fileNameDisplay').innerText = "Selected: " + file.name;
        }
    };

    document.getElementById('fileInput').addEventListener('change', handleFile);
    document.getElementById('cameraInput').addEventListener('change', handleFile);
</script>

</body>
</html>
