<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ka-Barangay Connect</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" href="img/logo.png" type="image/x-icon"> 

<style>
    body {
        background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
        min-height: 100vh;
    }

    .main-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .card-custom {
        border-radius: 20px;
    }

    .image img {
        width: 100%;
        max-width: 220px;
        object-fit: contain;
    }

    .btn-custom {
        background: #dcdcdc;
        border-radius: 10px;
        padding: 12px;
        transition: 0.3s;
        font-weight: 500;
    }

    .btn-custom:hover {
        background: #161890;
        color: white;
    }

    @media (min-width: 1200px) {
        .full-height {
            height: 80vh;
        }
    }
</style>

</head>
<body>

<div class="container-fluid main-container">
    <div class="row justify-content-center w-100">

        <div class="col-12 col-xl-8">
            <div class="card shadow card-custom p-3 p-xl-5 full-height">

                <div class="row h-100 align-items-center">

                    <!-- LEFT (IMAGE) -->
                    <div class="col-12 col-xl-6 text-center mb-4 mb-xl-0">
                        <div class="image mx-auto">
                            <img src="img/logo.png" alt="Logo">
                        </div>
                    </div>

                    <!-- RIGHT (TEXT + BUTTONS) -->
                    <div class="col-12 col-xl-6 text-center text-xl-start">

                        <h3 class="fw-bold">Ka-Barangay Connect</h3>
                        <p class="text-muted mb-4">San Bartolome</p>

                        <a href="resident.html" class="text-decoration-none">
                            <div class="btn btn-custom w-100 mb-3">Resident</div>
                        </a>

                        <a href="official.html" class="text-decoration-none">
                            <div class="btn btn-custom w-100">Official</div>
                        </a>

                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
